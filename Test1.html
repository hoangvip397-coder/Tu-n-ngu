<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG BẢO MẬT</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #btn-start { padding: 20px 40px; font-size: 22px; color: white; background: #c62828; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 0 15px #ff0000; font-weight: bold; }
        #jumpscare-box { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        #scary-img { max-width: 100%; max-height: 70vh; border: 4px solid red; object-fit: contain; }
    </style>
</head>
<body>

    <button id="btn-start">XÁC MINH THIẾT BỊ</button>

    <div id="jumpscare-box">
        <!-- Đã đổi sang link ảnh búp bê ma siêu kinh dị, bao hiện hình -->
        <img id="scary-img" src="https://i.imgur.com/v8tTf3g.jpeg" alt="Scary">
        <h1 style="color: red; margin-top: 20px; font-family: sans-serif; font-size: 40px; text-transform: uppercase;">TUẤN NGU !!!</h1>
    </div>

    <!-- Link tiếng thét chuẩn phim kinh dị cực lớn -->
    <audio id="scream-audio" preload="auto" crossorigin="anonymous">
        <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_b287968560.mp3?filename=witch-scream-97103.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('btn-start');
        const box = document.getElementById('jumpscare-box');
        const audio = document.getElementById('scream-audio');

        window.addEventListener('DOMContentLoaded', () => {
            audio.load();
        });

        function doJumpscare() {
            box.style.display = 'flex';
            audio.volume = 1.0;
            
            var playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => { audio.play(); });
            }
        }

        btn.addEventListener('click', doJumpscare);
        btn.addEventListener('touchstart', doJumpscare);
    </script>
</body>
</html>
