<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG BẢO MẬT</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #btn-start { padding: 20px 40px; font-size: 22px; color: white; background: #c62828; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 0 15px #ff0000; font-weight: bold; }
        #jumpscare-box { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        #scary-img { max-width: 90%; max-height: 70vh; border: 4px solid red; }
    </style>
</head>
<body>

    <button id="btn-start">XÁC MINH THIẾT BỊ</button>

    <div id="jumpscare-box">
        <img id="scary-img" src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=600" alt="Scary">
        <h1 style="color: red; margin-top: 20px; font-family: sans-serif; font-size: 40px; text-transform: uppercase;">TUẤN NGU !!!</h1>
    </div>

    <!-- Link tiếng thét dự phòng -->
    <audio id="scream-audio" preload="auto">
        <source src="https://www.soundjay.com/human/sounds/shriek-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('btn-start');
        const box = document.getElementById('jumpscare-box');
        const audio = document.getElementById('scream-audio');

        function playHackSound() {
            try {
                // TỰ TẠO TIẾNG RÍT CHÓI TAI BẰNG CHIP ÂM THANH ĐIỆN THOẠI (KHÔNG THỂ BỊ CHẶN)
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                
                // Tạo tiếng rít tần số cao
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sawtooth'; // Tiếng cưa chói tai
                oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); // Tần số cao nhức óc
                
                // Kích âm lượng max
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                // Giảm dần âm thanh sau 2 giây để không cháy loa
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 2);
            } catch(e) {
                console.log("Trình duyệt không hỗ trợ Web Audio");
            }

            // Đồng thời phát thêm file tiếng thét thực tế
            audio.volume = 1.0;
            audio.play().catch(() => {});
        }

        function doJumpscare() {
            box.style.display = 'flex';
            playHackSound();
        }

        btn.addEventListener('click', doJumpscare);
        btn.addEventListener('touchstart', doJumpscare);
    </script>
</body>
</html>
